<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="refresh" content="60">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; }

    .top-bar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 48px;
      overflow: hidden;
      z-index: 10;
      background: linear-gradient(90deg, #0d0d0d 0%, #069494 50%, #0d0d0d 100%);
      border-bottom: 2px solid #069494;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      font-family: Arial, sans-serif;
      font-size: 22px;
      font-weight: bold;
      color: #0d0d0d;
      letter-spacing: 1px;
    }

    .top-bar img {
      height: 36px;
      width: 36px;
      min-width: 36px;
      min-height: 36px;
      max-width: 36px;
      max-height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }

    iframe {
      position: fixed;
      top: 48px; left: 0;
      width: 100%;
      height: calc(100% - 48px);
      border: none;
      filter: invert(1) hue-rotate(150deg);
    }
  </style>
</head>
<body>
  <div class="top-bar">

    <img src="logo.png" alt="Winter Logo">
    <img src="logo.png" alt="Winter Logo">
  </div>

</body>
</html>
